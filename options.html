<!DOCTYPE html>
<html>
  <head>
    <title>Open in Freedium - Options</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h3>URL to hook: </h3>
    
    <div class="input-freedium-url">
      <input type="text" id="freedium-url" placeholder="default: https://freedium-mirror.cfd/"/>
      <!-- <button id="save-freedium-url">Save</button> -->
    </div>

    <label style="display:block; margin-top:10px;">
      <input type="checkbox" id="open-in-new-tab" />
      always open in new tab
    </label>

    <h3>
      By default this extension can open a page on "medium.com" in Freedium.
      Here you can add additional patterns for the extension to handle.
    </h3>
    <p>One per line. Wildcard supported.</p>
    <p>
      Examples: <br />
      <code>*://example.com/*</code><br />
      <code>*://*.example.com/*</code><br />
      <code>*://*.example.com/articles/*</code><br />
    </p>

    <textarea
      id="custom_patterns"
      name="custom_patterns"
      rows="10"
      cols="50"
      placeholder="*://*.example.com/*"
    >
    </textarea>

    <button id="save">Save</button>
    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
